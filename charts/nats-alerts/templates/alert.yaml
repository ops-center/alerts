{{ $app := (include "nats-alerts.fullname" .) }}
{{ $job := .Values.grafana.jobName }}
{{ $natsConsumerLabels := "namespace, job, account_id, stream_name, consumer_name" }}
{{ $natsStreamLabels := "namespace, job, account_id, stream_name" }}

{{ if (include "nats-alerts.alertsEnabled" .Values.form.alert.enabled) }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ $app }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "nats-alerts.labels" . | nindent 4 }}
{{- if .Values.form.alert.labels }}
    {{- toYaml .Values.form.alert.labels | nindent 4 }}
{{- end }}
{{- if .Values.form.alert.annotations }}
  annotations:
    {{- toYaml .Values.form.alert.annotations | nindent 4 }}
{{- end }}
spec:
  groups:
{{- with .Values.form.alert.groups.database }}
{{- if (include "nats-alerts.alertGroupEnabled" (list $.Values.form.alert.enabled .)) }}
  - name: nats.database.{{ $.Release.Namespace }}.{{ $app }}.rules
    rules:
    - record: nats:jetstream_consumer_num_pending:max
      expr: >-
        max by ({{ $natsConsumerLabels }}) (
          nats_consumer_num_pending{job="{{ $job }}",namespace="{{ $.Release.Namespace }}",is_consumer_leader="true"}
        )
    - record: nats:jetstream_consumer_num_ack_pending:max
      expr: >-
        max by ({{ $natsConsumerLabels }}) (
          nats_consumer_num_ack_pending{job="{{ $job }}",namespace="{{ $.Release.Namespace }}",is_consumer_leader="true"}
        )
    - record: nats:jetstream_consumer_delivered_progress_10m:max
      expr: >-
        max by ({{ $natsConsumerLabels }}) (
          max_over_time(nats_consumer_delivered_consumer_seq{job="{{ $job }}",namespace="{{ $.Release.Namespace }}",is_consumer_leader="true"}[10m])
          -
          min_over_time(nats_consumer_delivered_consumer_seq{job="{{ $job }}",namespace="{{ $.Release.Namespace }}",is_consumer_leader="true"}[10m])
        )
    - record: nats:jetstream_stream_total_messages:max
      expr: >-
        max by ({{ $natsStreamLabels }}) (
          nats_stream_total_messages{job="{{ $job }}",namespace="{{ $.Release.Namespace }}",is_stream_leader="true"}
        )
    - record: nats:jetstream_stream_limit_messages:max
      expr: >-
        max by ({{ $natsStreamLabels }}) (
          nats_stream_limit_messages{job="{{ $job }}",namespace="{{ $.Release.Namespace }}",is_stream_leader="true"}
        )
    - record: nats:jetstream_stream_total_bytes:max
      expr: >-
        max by ({{ $natsStreamLabels }}) (
          nats_stream_total_bytes{job="{{ $job }}",namespace="{{ $.Release.Namespace }}",is_stream_leader="true"}
        )
    - record: nats:jetstream_stream_limit_bytes:max
      expr: >-
        max by ({{ $natsStreamLabels }}) (
          nats_stream_limit_bytes{job="{{ $job }}",namespace="{{ $.Release.Namespace }}",is_stream_leader="true"}
        )
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsDown.enabled .rules.natsDown.severity)) }}
    - alert: NatsDown
      expr: up{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} == 0 or absent_over_time(up{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"}[2m])
      for: {{ .rules.natsDown.duration }}
      labels:
        severity: {{ .rules.natsDown.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "NATS is down or not being scraped in namespace {{`{{`}} $labels.namespace {{`}}`}}"
        description: "Prometheus has not observed a healthy NATS scrape target for job {{`{{`}} $labels.job {{`}}`}}. Scrape disappearance is detected after 2 minutes of absence and must persist for the configured alert duration before firing.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamHighMemoryUsage.enabled .rules.natsJetStreamHighMemoryUsage.severity)) }}
    - alert: NatsJetStreamHighMemoryUsage
      expr: (nats_varz_jetstream_stats_memory{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} / nats_varz_jetstream_config_max_memory{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} * 100) > {{ .rules.natsJetStreamHighMemoryUsage.val }}
      for: {{ .rules.natsJetStreamHighMemoryUsage.duration }}
      labels:
        severity: {{ .rules.natsJetStreamHighMemoryUsage.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "NATS JetStream high memory usage (instance {{`{{`}} $labels.server_id {{`}}`}})"
        description: "JetStream memory usage is at {{`{{`}} $value | printf \"%.2f\" {{`}}`}}%, which is above the {{ .rules.natsJetStreamHighMemoryUsage.val }}% threshold.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamHighStorageUsage.enabled .rules.natsJetStreamHighStorageUsage.severity)) }}
    - alert: NatsJetStreamHighStorageUsage
      expr: (nats_varz_jetstream_stats_storage{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} / nats_varz_jetstream_config_max_storage{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} * 100) > {{ .rules.natsJetStreamHighStorageUsage.val }}
      for: {{ .rules.natsJetStreamHighStorageUsage.duration }}
      labels:
        severity: {{ .rules.natsJetStreamHighStorageUsage.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "NATS JetStream high storage usage (instance {{`{{`}} $labels.server_id {{`}}`}})"
        description: "JetStream storage usage is at {{`{{`}} $value | printf \"%.2f\" {{`}}`}}%, which is above the {{ .rules.natsJetStreamHighStorageUsage.val }}% threshold.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}

{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamHighPendingMessages.enabled .rules.natsJetStreamHighPendingMessages.severity)) }}
    - alert: NatsJetStreamHighPendingMessages
      expr: nats:jetstream_consumer_num_pending:max > {{ .rules.natsJetStreamHighPendingMessages.val }}
      for: {{ .rules.natsJetStreamHighPendingMessages.duration }}
      labels:
        severity: {{ .rules.natsJetStreamHighPendingMessages.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "High number of pending messages for consumer {{`{{`}} $labels.consumer_name {{`}}`}} on stream {{`{{`}} $labels.stream_name {{`}}`}}"
        description: "Consumer {{`{{`}} $labels.consumer_name {{`}}`}} on stream {{`{{`}} $labels.stream_name {{`}}`}} has {{`{{`}} $value {{`}}`}} pending messages, exceeding the {{ .rules.natsJetStreamHighPendingMessages.val }} threshold. The consumer may be slow or down.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamHighPendingMessagesWarning.enabled .rules.natsJetStreamHighPendingMessagesWarning.severity)) }}
    - alert: NatsJetStreamHighPendingMessagesWarning
      expr: nats:jetstream_consumer_num_pending:max > {{ .rules.natsJetStreamHighPendingMessagesWarning.val }} and nats:jetstream_consumer_num_pending:max <= {{ .rules.natsJetStreamHighPendingMessages.val }}
      for: {{ .rules.natsJetStreamHighPendingMessagesWarning.duration }}
      labels:
        severity: {{ .rules.natsJetStreamHighPendingMessagesWarning.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "Warning: High number of pending messages for consumer {{`{{`}} $labels.consumer_name {{`}}`}} on stream {{`{{`}} $labels.stream_name {{`}}`}}"
        description: "Consumer {{`{{`}} $labels.consumer_name {{`}}`}} on stream {{`{{`}} $labels.stream_name {{`}}`}} has {{`{{`}} $value {{`}}`}} pending messages, exceeding the {{ .rules.natsJetStreamHighPendingMessagesWarning.val }} warning threshold.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamHighAckPending.enabled .rules.natsJetStreamHighAckPending.severity)) }}
    - alert: NatsJetStreamHighAckPending
      expr: nats:jetstream_consumer_num_ack_pending:max > {{ .rules.natsJetStreamHighAckPending.val }}
      for: {{ .rules.natsJetStreamHighAckPending.duration }}
      labels:
        severity: {{ .rules.natsJetStreamHighAckPending.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "High number of unacknowledged messages for consumer {{`{{`}} $labels.consumer_name {{`}}`}} on stream {{`{{`}} $labels.stream_name {{`}}`}}"
        description: "Consumer {{`{{`}} $labels.consumer_name {{`}}`}} on stream {{`{{`}} $labels.stream_name {{`}}`}} has {{`{{`}} $value {{`}}`}} messages pending acknowledgement (ack), exceeding the {{ .rules.natsJetStreamHighAckPending.val }} threshold. This could indicate a processing issue.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamBacklogNoProgress.enabled .rules.natsJetStreamBacklogNoProgress.severity)) }}
    - alert: NatsJetStreamBacklogNoProgress
      expr: >-
        nats:jetstream_consumer_num_pending:max > {{ .rules.natsJetStreamBacklogNoProgress.val }}
        and on ({{ $natsConsumerLabels }})
        nats:jetstream_consumer_delivered_progress_10m:max == 0
      for: {{ .rules.natsJetStreamBacklogNoProgress.duration }}
      labels:
        severity: {{ .rules.natsJetStreamBacklogNoProgress.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "Consumer backlog is not draining for {{`{{`}} $labels.consumer_name {{`}}`}} on stream {{`{{`}} $labels.stream_name {{`}}`}}"
        description: "Consumer {{`{{`}} $labels.consumer_name {{`}}`}} on stream {{`{{`}} $labels.stream_name {{`}}`}} has {{`{{`}} $value {{`}}`}} pending messages and no delivery progress over the last 10 minutes.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}

{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamNearMessageLimit.enabled .rules.natsJetStreamNearMessageLimit.severity)) }}
    - alert: NatsJetStreamNearMessageLimit
      expr: >-
        ((nats:jetstream_stream_total_messages:max / nats:jetstream_stream_limit_messages:max) * 100) > {{ .rules.natsJetStreamNearMessageLimit.val }}
        and on ({{ $natsStreamLabels }})
        nats:jetstream_stream_limit_messages:max > 0
      for: {{ .rules.natsJetStreamNearMessageLimit.duration }}
      labels:
        severity: {{ .rules.natsJetStreamNearMessageLimit.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "Stream {{`{{`}} $labels.stream_name {{`}}`}} is nearing its message limit"
        description: "Stream {{`{{`}} $labels.stream_name {{`}}`}} is at {{`{{`}} $value | printf \"%.2f\" {{`}}`}}% of its configured message limit.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamNearByteLimit.enabled .rules.natsJetStreamNearByteLimit.severity)) }}
    - alert: NatsJetStreamNearByteLimit
      expr: >-
        ((nats:jetstream_stream_total_bytes:max / nats:jetstream_stream_limit_bytes:max) * 100) > {{ .rules.natsJetStreamNearByteLimit.val }}
        and on ({{ $natsStreamLabels }})
        nats:jetstream_stream_limit_bytes:max > 0
      for: {{ .rules.natsJetStreamNearByteLimit.duration }}
      labels:
        severity: {{ .rules.natsJetStreamNearByteLimit.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "Stream {{`{{`}} $labels.stream_name {{`}}`}} is nearing its byte limit"
        description: "Stream {{`{{`}} $labels.stream_name {{`}}`}} is at {{`{{`}} $value | printf \"%.2f\" {{`}}`}}% of its configured byte limit.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsJetStreamDisabled.enabled .rules.natsJetStreamDisabled.severity)) }}
    - alert: NatsJetStreamDisabled
      expr: nats_server_jetstream_disabled{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} == 1
      for: {{ .rules.natsJetStreamDisabled.duration }}
      labels:
        severity: {{ .rules.natsJetStreamDisabled.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "JetStream is disabled on NATS server {{`{{`}} $labels.server_name {{`}}`}}"
        description: "JetStream is disabled on server {{`{{`}} $labels.server_name {{`}}`}}. Streams and consumers will not function correctly until JetStream is restored.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsSlowConsumers.enabled .rules.natsSlowConsumers.severity)) }}
    - alert: NatsSlowConsumers
      expr: nats_varz_slow_consumers{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} > 0
      for: {{ .rules.natsSlowConsumers.duration }}
      labels:
        severity: {{ .rules.natsSlowConsumers.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "NATS server {{`{{`}} $labels.server_name {{`}}`}} is seeing slow consumers"
        description: "NATS server {{`{{`}} $labels.server_name {{`}}`}} reports {{`{{`}} $value {{`}}`}} slow consumers. This usually indicates downstream clients are not keeping up with delivery.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsStalledClients.enabled .rules.natsStalledClients.severity)) }}
    - alert: NatsStalledClients
      expr: nats_varz_stalled_clients{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} > 0
      for: {{ .rules.natsStalledClients.duration }}
      labels:
        severity: {{ .rules.natsStalledClients.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "NATS server {{`{{`}} $labels.server_name {{`}}`}} has stalled clients"
        description: "NATS server {{`{{`}} $labels.server_name {{`}}`}} reports {{`{{`}} $value {{`}}`}} stalled clients. This points to client-side backpressure or connectivity issues that can affect message flow.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsStaleConnections.enabled .rules.natsStaleConnections.severity)) }}
    - alert: NatsStaleConnections
      expr: nats_varz_stale_connections{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} > 0
      for: {{ .rules.natsStaleConnections.duration }}
      labels:
        severity: {{ .rules.natsStaleConnections.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "NATS server {{`{{`}} $labels.server_name {{`}}`}} has stale connections"
        description: "NATS server {{`{{`}} $labels.server_name {{`}}`}} reports {{`{{`}} $value {{`}}`}} stale connections. This suggests client connectivity churn or unhealthy networking.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}

{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsSuddenConnectionDrop.enabled .rules.natsSuddenConnectionDrop.severity)) }}
    - alert: NatsSuddenConnectionDrop
      expr: changes(nats_varz_connections{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"}[5m]) > {{ .rules.natsSuddenConnectionDrop.val }} AND deriv(nats_varz_connections{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"}[5m]) < 0
      for: {{ .rules.natsSuddenConnectionDrop.duration }}
      labels:
        severity: {{ .rules.natsSuddenConnectionDrop.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "Sudden drop in NATS connections (instance {{`{{`}} $labels.server_id {{`}}`}})"
        description: "The number of active connections to NATS server {{`{{`}} $labels.server_id {{`}}`}} has dropped significantly over the last 5 minutes. This could indicate a client-side issue or network problem.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsHighActiveConnections.enabled .rules.natsHighActiveConnections.severity)) }}
    - alert: NatsHighActiveConnections
      expr: nats_varz_connections{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} > {{ .rules.natsHighActiveConnections.val }}
      for: {{ .rules.natsHighActiveConnections.duration }}
      labels:
        severity: {{ .rules.natsHighActiveConnections.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "High active connections"
        description: "Active connections exceed {{ .rules.natsHighActiveConnections.val }}: {{`{{`}} $value {{`}}`}}. Monitor for load spikes or connection leaks."
{{- end }}

{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsSuddenConsumerDrop.enabled .rules.natsSuddenConsumerDrop.severity)) }}
    - alert: NatsSuddenConsumerDrop
      expr: changes(nats_server_total_consumers{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"}[5m]) > {{ .rules.natsSuddenConsumerDrop.val }} AND deriv(nats_server_total_consumers{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"}[5m]) < 0
      for: {{ .rules.natsSuddenConsumerDrop.duration }}
      labels:
        severity: {{ .rules.natsSuddenConsumerDrop.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "Sudden drop in total NATS consumers (instance {{`{{`}} $labels.server_id {{`}}`}})"
        description: "The total number of consumers on NATS server {{`{{`}} $labels.server_id {{`}}`}} has dropped significantly. This might indicate a deployment or application failure.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
{{- end }}
{{- if (include "nats-alerts.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules.natsHighTotalConsumers.enabled .rules.natsHighTotalConsumers.severity)) }}
    - alert: NatsHighTotalConsumers
      expr: nats_server_total_consumers{job="{{ $job }}",namespace="{{ $.Release.Namespace }}"} > {{ .rules.natsHighTotalConsumers.val }}
      for: {{ .rules.natsHighTotalConsumers.duration }}
      labels:
        severity: {{ .rules.natsHighTotalConsumers.severity }}
        {{- include "nats-alerts.alertLabels" $ | nindent 8 }}
      annotations:
        summary: "High total consumers"
        description: "Total consumers exceed {{ .rules.natsHighTotalConsumers.val }}: {{`{{`}} $value {{`}}`}}. Review resource allocation and consumer scaling."
{{- end }}
{{- end }}
{{- end }}
{{ end }}
