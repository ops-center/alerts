# Default values for nats-alerts.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

metadata:
  resource:
    group: apps
    kind: StatefulSet
    name: statefulsets
    scope: Namespaced
    version: v1
  release:
    # Release name
    name: ""
    # Release namespace
    namespace: ""

form:
  alert:
    ## Enable PrometheusRule alerts
    enabled: warning

    ## Labels for default rules
    labels: # +doc-gen:break
      release: kube-prometheus-stack

    ## Annotations for default rules
    annotations: {}

    ## Additional labels for PrometheusRule alerts
    additionalRuleLabels: {}

    ## Prefix for runbook URLs. Use this to override the first part of the runbookURLs that is common to all rules.
    # runbookUrl: "https://runbooks.prometheus-operator.dev/runbooks"

    groups:
      core:
        enabled: warning
        rules:
          natsDown:
            enabled: true
            duration: "2m"
            severity: critical
          natsReplicasNotReady:
            enabled: true
            duration: "2m"
            severity: critical

      resourceUtilization:
        enabled: warning
        rules:
          natsJetStreamHighMemoryUsage:
            enabled: true
            duration: "5m"
            severity: critical
            val: 90
          natsJetStreamHighStorageUsage:
            enabled: true
            duration: "5m"
            severity: critical
            val: 90

      consumerHealth:
        enabled: warning
        rules:
          natsJetStreamHighPendingMessages:
            enabled: true
            duration: "10m"
            severity: critical
            val: 5000
          natsJetStreamHighPendingMessagesWarning:
            enabled: true
            duration: "10m"
            severity: warning
            val: 2000
          natsJetStreamHighAckPending:
            enabled: true
            duration: "10m"
            severity: critical
            val: 2000
          natsJetStreamBacklogNoProgress:
            enabled: true
            duration: "15m"
            severity: warning
            val: 100

      streamPerformance:
        enabled: warning
        rules:
          natsJetStreamNearMessageLimit:
            enabled: true
            duration: "15m"
            severity: warning
            val: 80
          natsJetStreamNearByteLimit:
            enabled: true
            duration: "15m"
            severity: warning
            val: 80

      connectivity:
        enabled: warning
        rules:
          natsJetStreamDisabled:
            enabled: true
            duration: "2m"
            severity: critical
          natsSlowConsumers:
            enabled: true
            duration: "5m"
            severity: warning
          natsStalledClients:
            enabled: true
            duration: "5m"
            severity: warning
          natsStaleConnections:
            enabled: true
            duration: "10m"
            severity: warning
          natsSuddenConnectionDrop:
            enabled: true
            duration: "5m"
            severity: warning
            val: 5
          natsHighActiveConnections:
            enabled: true
            duration: "5m"
            severity: warning
            val: 1000

      consumerManagement:
        enabled: warning
        rules:
          natsSuddenConsumerDrop:
            enabled: true
            duration: "5m"
            severity: warning
            val: 2
          natsHighTotalConsumers:
            enabled: true
            duration: "5m"
            severity: warning
            val: 100

grafana:
  enabled: false
  version: 8.2.3
  jobName: nats
  url: ""
  apikey: ""
